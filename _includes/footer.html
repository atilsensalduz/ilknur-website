<footer class="site-footer" role="contentinfo">
  <div class="container">

    <!-- Main grid: brand / links / contact -->
    <div class="footer-grid">

      <!-- Brand -->
      <div class="footer-brand">
        <a href="{{ '/' | relative_url }}" class="footer-logo" aria-label="{{ site.title }} — Ana Sayfa">
          {{ site.author.name }}
        </a>
        <p class="footer-tagline">
          Güven, farkındalık ve iyileşme yolculuğunda<br>her adımda yanınızdayım.
        </p>
      </div>

      <!-- Navigation links -->
      <div class="footer-links">
        <p class="footer-col-heading">Sayfalar</p>
        <ul role="list">
          <li><a href="{{ '/' | relative_url }}">Ana Sayfa</a></li>
          <li><a href="{{ '/pages/hakkimda/' | relative_url }}">Hakkımda</a></li>
          <li><a href="{{ '/pages/hizmetler/' | relative_url }}">Hizmetler</a></li>
          <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
          <li><a href="{{ '/pages/iletisim/' | relative_url }}">İletişim</a></li>
        </ul>
      </div>

      <!-- Contact -->
      <div class="footer-contact">
        <p class="footer-col-heading">İletişim</p>
        <address>
          <a href="tel:{{ site.author.phone | remove: ' ' }}" class="footer-contact-link">
            <!-- Phone icon -->
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l1.67-1.34a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            {{ site.author.phone }}
          </a>
          <a href="mailto:{{ site.author.email }}" class="footer-contact-link">
            <!-- Mail icon -->
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            {{ site.author.email }}
          </a>
        </address>
      </div>

    </div><!-- /.footer-grid -->

    <!-- Bottom bar: copyright / legal / social -->
    <div class="footer-bottom">

      <p class="footer-copy">
        &copy; {{ site.time | date: "%Y" }} {{ site.title }}. Tüm hakları saklıdır.
      </p>

      <!-- Social media -->
      <div class="footer-social" role="list" aria-label="Sosyal medya hesapları">

        <!-- Instagram -->
        <a href="{{ site.author.instagram }}" class="social-link"
           aria-label="Instagram" role="listitem"
           target="_blank" rel="noopener noreferrer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>

        <!-- LinkedIn -->
        <a href="{{ site.author.linkedin }}" class="social-link"
           aria-label="LinkedIn" role="listitem"
           target="_blank" rel="noopener noreferrer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </a>

        <!-- Facebook -->
        <a href="{{ site.author.facebook }}" class="social-link"
           aria-label="Facebook" role="listitem"
           target="_blank" rel="noopener noreferrer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </a>

      </div><!-- /.footer-social -->

    </div><!-- /.footer-bottom -->

  </div><!-- /.container -->
</footer>
